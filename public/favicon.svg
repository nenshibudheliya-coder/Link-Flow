<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-red" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a15" />
      <stop offset="100%" stop-color="#001428" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)" />
  <rect width="512" height="512" rx="110" fill="transparent" stroke="#00b4ff" stroke-width="4" stroke-opacity="0.2" />

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="3">
    <!-- Vertical lines -->
    <line x1="178" y1="22" x2="178" y2="490" />
    <line x1="334" y1="22" x2="334" y2="490" />
    <!-- Horizontal lines -->
    <line x1="22" y1="178" x2="490" y2="178" />
    <line x1="22" y1="334" x2="490" y2="334" />
  </g>

  <!-- Blue Path -->
  <g filter="url(#glow-blue)">
    <path d="M 100,100 L 412,100" stroke="#00b4ff" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <circle cx="100" cy="100" r="35" fill="#00b4ff" />
    <circle cx="412" cy="100" r="35" fill="#00b4ff" />
    <circle cx="92" cy="92" r="8" fill="#ffffff" fill-opacity="0.6" />
    <circle cx="404" cy="92" r="8" fill="#ffffff" fill-opacity="0.6" />
  </g>

  <!-- Green Path -->
  <g filter="url(#glow-green)">
    <path d="M 100,256 L 100,412 L 256,412" stroke="#00e676" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <circle cx="100" cy="256" r="35" fill="#00e676" />
    <circle cx="256" cy="412" r="35" fill="#00e676" />
    <circle cx="92" cy="248" r="8" fill="#ffffff" fill-opacity="0.6" />
    <circle cx="248" cy="404" r="8" fill="#ffffff" fill-opacity="0.6" />
  </g>

  <!-- Pink/Red Path -->
  <g filter="url(#glow-red)">
    <path d="M 256,256 L 412,256 L 412,412" stroke="#ff3b5c" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <circle cx="256" cy="256" r="35" fill="#ff3b5c" />
    <circle cx="412" cy="412" r="35" fill="#ff3b5c" />
    <circle cx="248" cy="248" r="8" fill="#ffffff" fill-opacity="0.6" />
    <circle cx="404" cy="404" r="8" fill="#ffffff" fill-opacity="0.6" />
  </g>
</svg>